<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Predictor League</title>
  <script>
    const path = window.location.pathname;
    const segments = path.split('/');
    const challengeId = segments[segments.length - 1];
    
    const appUrl = 'https://shokhbesati-dev.github.io/predictor-league/challenge/' + challengeId;
    const playStoreUrl = 'https://play.google.com/store/apps/details?id=com.example.predictor_league';
    
    setTimeout(function() {
      window.location = playStoreUrl;
    }, 2000);
    
    window.location = appUrl;
  </script>
</head>
<body>
  <p>Opening Predictor League...</p>
</body>
</html>
